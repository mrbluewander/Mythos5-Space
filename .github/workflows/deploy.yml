name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        run: |
          curl -X POST https://api.render.com/v1/services/srv-d8cgsqd7vvec73dchm7g/deploys \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"
